<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs — Boutique D</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay"></div>
<div class="layout">
  <header class="topbar">
    <button class="topbar-menu-btn" id="menu-btn"><i class="bi bi-list"></i></button>
    <div class="topbar-brand">
      <div class="brand-icon"><i class="bi bi-bag-fill"></i></div>
      Boutique D
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="btn btn-ghost btn-sm" id="btn-logout">
      <i class="bi bi-box-arrow-right"></i> Déconnexion
    </button>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section">Principal</div>
    <a href="dashboard.html" class="nav-item">
      <span class="icon"><i class="bi bi-grid-1x2-fill"></i></span> Dashboard
    </a>
    <a href="pos.html" class="nav-item">
      <span class="icon"><i class="bi bi-cash-register"></i></span> Caisse (POS)
    </a>
    <div class="sidebar-section">Stock</div>
    <a href="stock.html" class="nav-item">
      <span class="icon"><i class="bi bi-boxes"></i></span> Stock
      <span class="nav-badge hidden" id="alert-badge">0</span>
    </a>
    <a href="products.html" class="nav-item">
      <span class="icon"><i class="bi bi-tag-fill"></i></span> Produits
    </a>
    <div class="sidebar-section">Gestion</div>
    <a href="users.html" class="nav-item">
      <span class="icon"><i class="bi bi-people-fill"></i></span> Utilisateurs
    </a>
    <a href="reports.html" class="nav-item">
      <span class="icon"><i class="bi bi-bar-chart-fill"></i></span> Rapports
    </a>
  </nav>

  <main class="main">
    <div class="page-title">
      <div class="page-icon" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
        <i class="bi bi-people-fill"></i>
      </div>
      Utilisateurs
    </div>

    <div class="flex justify-between items-center mb-4">
      <div style="position:relative">
        <i class="bi bi-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none"></i>
        <input class="form-control" id="user-search" placeholder="Rechercher un utilisateur…"
               style="padding-left:34px;max-width:280px">
      </div>
      <button class="btn btn-primary" id="btn-add-user">
        <i class="bi bi-person-plus-fill"></i> Nouvel utilisateur
      </button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Identifiant</th>
              <th>Téléphone</th>
              <th>Rôle</th>
              <th>Statut</th>
              <th>Dernière connexion</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal utilisateur -->
<div class="modal-backdrop" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="user-modal-title">
        <i class="bi bi-person-plus-fill" style="color:#4f46e5"></i> Nouvel utilisateur
      </span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="u-id">
      <div class="grid grid-2 gap-3">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Nom complet *</label>
          <input class="form-control" id="u-name" type="text" placeholder="Ex: Marie Dupont">
        </div>
        <div class="form-group">
          <label class="form-label">Identifiant (login) *</label>
          <input class="form-control" id="u-username" type="text" placeholder="Ex: marie.d">
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input class="form-control" id="u-phone" type="tel" placeholder="Ex: 0600000000">
        </div>
        <div class="form-group">
          <label class="form-label">Rôle *</label>
          <select class="form-control form-select" id="u-role">
            <option value="caissier">Caissier</option>
            <option value="vendeur">Vendeur</option>
            <option value="gestionnaire">Gestionnaire</option>
            <option value="proprietaire">Propriétaire</option>
          </select>
        </div>
        <div class="form-group" id="u-pass-group">
          <label class="form-label">Mot de passe *</label>
          <input class="form-control" id="u-password" type="password" placeholder="Min. 6 caractères">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss>Annuler</button>
      <button class="btn btn-primary" id="btn-save-user"><i class="bi bi-check-lg"></i> Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal reset password -->
<div class="modal-backdrop" id="modal-reset-pwd">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title">
        <i class="bi bi-key-fill" style="color:#f59e0b"></i> Réinitialiser mot de passe
      </span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="rp-user-id">
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe *</label>
        <input class="form-control" id="rp-password" type="password" placeholder="Min. 6 caractères">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss>Annuler</button>
      <button class="btn btn-danger" id="btn-confirm-reset"><i class="bi bi-check-lg"></i> Réinitialiser</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth();

let users = [];

async function loadUsers(query = '') {
  try {
    const params = query ? `?search=${encodeURIComponent(query)}` : '';
    users = await api.get(`/users${params}`);
    const roleLabel = {
      proprietaire: 'Propriétaire',
      caissier:     'Caissier',
      vendeur:      'Vendeur',
      gestionnaire: 'Gestionnaire',
    };
    const roleColor = {
      proprietaire: 'badge-accent',
      caissier:     'badge-neutral',
      vendeur:      'badge-neutral',
      gestionnaire: 'badge-neutral',
    };
    renderTable('users-tbody', users.map(u => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.9rem;flex-shrink:0">
              ${escHtml(u.name.charAt(0).toUpperCase())}
            </div>
            <strong>${escHtml(u.name)}</strong>
          </div>
        </td>
        <td><code style="background:#f1f5f9;padding:2px 8px;border-radius:5px;font-size:.82rem">${escHtml(u.username)}</code></td>
        <td>${escHtml(u.phone ?? '—')}</td>
        <td><span class="badge ${roleColor[u.role] ?? 'badge-neutral'}">${roleLabel[u.role] ?? escHtml(u.role)}</span></td>
        <td>
          <span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">
            <i class="bi bi-circle-fill" style="font-size:.45rem"></i>
            ${u.is_active ? 'Actif' : 'Inactif'}
          </span>
          ${u.is_locked ? '<span class="badge badge-danger ml-1"><i class="bi bi-lock-fill"></i> Bloqué</span>' : ''}
        </td>
        <td class="text-muted font-sm">${escHtml(u.last_login_at ?? '—')}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-outline" onclick="editUser(${u.id})" title="Modifier">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-ghost" onclick="toggleUser(${u.id})" title="${u.is_active ? 'Désactiver' : 'Activer'}">
              <i class="bi bi-toggle-${u.is_active ? 'on' : 'off'}"></i>
            </button>
            <button class="btn btn-sm btn-ghost" onclick="resetPwd(${u.id})" title="Réinitialiser mot de passe">
              <i class="bi bi-key-fill" style="color:#f59e0b"></i>
            </button>
          </div>
        </td>
      </tr>`), 'Aucun utilisateur');
  } catch (err) { toast(err.message, 'danger'); }
}

function editUser(id) {
  const u = users.find(u => u.id === id);
  if (!u) return;
  document.getElementById('u-id').value       = id;
  document.getElementById('u-name').value     = u.name;
  document.getElementById('u-username').value = u.username;
  document.getElementById('u-phone').value    = u.phone ?? '';
  document.getElementById('u-role').value     = u.role;
  document.getElementById('u-password').value = '';
  document.getElementById('u-pass-group').style.display = 'none';
  document.getElementById('user-modal-title').innerHTML = '<i class="bi bi-pencil-square" style="color:#4f46e5"></i> Modifier utilisateur';
  openModal('modal-user');
}

async function toggleUser(id) {
  try {
    await api.patch(`/users/${id}/toggle-status`);
    toast('Statut mis à jour', 'success');
    loadUsers();
  } catch (err) { toast(err.message, 'danger'); }
}

function resetPwd(id) {
  document.getElementById('rp-user-id').value  = id;
  document.getElementById('rp-password').value = '';
  openModal('modal-reset-pwd');
}

let searchTimer;
document.getElementById('user-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadUsers(e.target.value), 300);
});

document.getElementById('btn-add-user').addEventListener('click', () => {
  ['u-id','u-name','u-username','u-phone','u-password'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('u-role').value = 'caissier';
  document.getElementById('u-pass-group').style.display = 'block';
  document.getElementById('user-modal-title').innerHTML = '<i class="bi bi-person-plus-fill" style="color:#4f46e5"></i> Nouvel utilisateur';
  openModal('modal-user');
});

document.getElementById('btn-save-user').addEventListener('click', async () => {
  const id   = document.getElementById('u-id').value;
  const body = {
    name:     document.getElementById('u-name').value,
    username: document.getElementById('u-username').value,
    phone:    document.getElementById('u-phone').value || null,
    role:     document.getElementById('u-role').value,
  };
  const pwd = document.getElementById('u-password').value;
  if (pwd) body.password = pwd;
  if (!body.name || !body.username) { toast('Nom et identifiant requis', 'warning'); return; }
  try {
    if (id) await api.put(`/users/${id}`, body);
    else    await api.post('/users', { ...body, password: pwd });
    closeModal('modal-user');
    toast('Utilisateur enregistré', 'success');
    loadUsers();
  } catch (err) { toast(err.message, 'danger'); }
});

document.getElementById('btn-confirm-reset').addEventListener('click', async () => {
  const id  = document.getElementById('rp-user-id').value;
  const pwd = document.getElementById('rp-password').value;
  if (!pwd || pwd.length < 6) { toast('Mot de passe trop court (min 6 car.)', 'warning'); return; }
  try {
    await api.post(`/users/${id}/reset-password`, { password: pwd });
    closeModal('modal-reset-pwd');
    toast('Mot de passe réinitialisé', 'success');
  } catch (err) { toast(err.message, 'danger'); }
});

loadUsers();
</script>
</body>
</html>
