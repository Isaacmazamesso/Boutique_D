<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comptage inventaire — Boutique D</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .inv-progress-track {
      width: 100%; height: 8px; border-radius: 5px;
      background: var(--bg); border: 1px solid var(--border);
      overflow: hidden; margin-top: 6px;
    }
    .inv-progress-fill {
      height: 100%; border-radius: 5px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      transition: width .25s;
    }
    .inv-meta { display: flex; flex-wrap: wrap; gap: 22px; font-size: .82rem; color: var(--text-muted); margin-top: 10px; }
    .inv-meta strong { color: var(--text); font-weight: 600; }
    .count-input { width: 90px; text-align: right; }
    .row-ecart-pos { color: var(--success); font-weight: 700; }
    .row-ecart-neg { color: var(--danger); font-weight: 700; }
    .row-ecart-zero { color: var(--text-muted); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay"></div>
<div class="layout">
  <header class="topbar">
    <button class="topbar-menu-btn" id="menu-btn"><i class="bi bi-list"></i></button>
    <div class="topbar-brand">
      <div class="brand-icon"><i class="bi bi-bag-fill"></i></div>
      Boutique D
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="btn btn-ghost btn-sm" id="btn-logout">
      <i class="bi bi-box-arrow-right"></i> Déconnexion
    </button>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section">Principal</div>
    <a href="dashboard.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-grid-1x2-fill"></i></span> Dashboard
    </a>
    <a href="pos.html" class="nav-item">
      <span class="icon"><i class="bi bi-cash-register"></i></span> Caisse (POS)
    </a>
    <div class="sidebar-section" data-role="proprietaire,gestionnaire">Stock</div>
    <a href="stock.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-boxes"></i></span> Stock
      <span class="nav-badge hidden" id="alert-badge">0</span>
    </a>
    <a href="products.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-tag-fill"></i></span> Produits
    </a>
    <div class="sidebar-section" data-role="proprietaire">Gestion</div>
    <a href="users.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-people-fill"></i></span> Utilisateurs
    </a>
    <a href="reports.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-bar-chart-fill"></i></span> Rapports
    </a>
  </nav>

  <main class="main">
    <div class="flex justify-between items-center" style="margin-bottom:22px">
      <div class="page-title" style="margin-bottom:0">
        <div class="page-icon" style="background:#059669">
          <i class="bi bi-clipboard2-check"></i>
        </div>
        <span id="inv-title">Inventaire</span>
        <small id="inv-status-badge"></small>
      </div>
      <a href="stock.html" class="btn btn-outline btn-sm">
        <i class="bi bi-arrow-left"></i> Retour au stock
      </a>
    </div>

    <div class="card mb-6" id="inv-info-card">
      <div class="skeleton" style="height:70px;border-radius:12px"></div>
    </div>

    <div class="kpi-grid mb-6 hidden" id="inv-ecart-kpis"></div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="bi bi-list-ul" style="color:#4f46e5"></i> Produits à compter
        </div>
        <div style="position:relative">
          <i class="bi bi-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none"></i>
          <input class="form-control" id="inv-search" placeholder="Filtrer par nom…" style="padding-left:34px;max-width:220px">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Produit</th>
              <th>Catégorie</th>
              <th>Théorique</th>
              <th>Compté</th>
              <th>Écart</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="inv-items-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="flex justify-between items-center" style="margin-top:18px" id="inv-actions">
      <span class="text-muted" style="font-size:.82rem" id="inv-progress-label"></span>
      <div class="flex gap-2">
        <button class="btn btn-primary hidden" id="btn-save-count">
          <i class="bi bi-check-lg"></i> Enregistrer le comptage
        </button>
        <button class="btn btn-accent hidden" id="btn-validate-inventory" data-role="proprietaire">
          <i class="bi bi-shield-check"></i> Valider l'inventaire
        </button>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth();
document.querySelector('a[href="stock.html"]')?.classList.add('active');

const invId = new URLSearchParams(location.search).get('id');
let inventory = null;

async function init() {
  if (!invId) {
    toast('Aucun inventaire sélectionné', 'danger');
    window.location.href = 'stock.html';
    return;
  }
  await loadInventory();
  bindEvents();
}

async function loadInventory() {
  try {
    inventory = await api.get(`/inventories/${invId}`);
    render();
  } catch (err) {
    toast(err.message, 'danger');
    window.location.href = 'stock.html';
  }
}

function render() {
  const typeLabel   = inventory.type === 'complet' ? 'Complet' : 'Partiel';
  const statusBadge = inventory.status === 'valide' ? 'badge-success' : 'badge-warning';
  const statusLabel = inventory.status === 'valide' ? 'Validé' : 'En cours';

  document.getElementById('inv-title').textContent = inventory.name;
  document.getElementById('inv-status-badge').innerHTML =
    `<span class="badge ${statusBadge}">${statusLabel}</span>`;

  document.getElementById('inv-info-card').innerHTML = `
    <div class="inv-meta">
      <span>Type : <strong>${escHtml(typeLabel)}</strong>${inventory.category ? ` (${escHtml(inventory.category)})` : ''}</span>
      <span>Créé par : <strong>${escHtml(inventory.created_by ?? '—')}</strong></span>
      <span>Créé le : <strong>${escHtml(inventory.created_at ?? '—')}</strong></span>
      ${inventory.status === 'valide' ? `
        <span>Validé par : <strong>${escHtml(inventory.validated_by ?? '—')}</strong></span>
        <span>Validé le : <strong>${escHtml(inventory.validated_at ?? '—')}</strong></span>
      ` : ''}
    </div>
    <div class="inv-progress-track">
      <div class="inv-progress-fill" style="width:${inventory.progression ?? 0}%"></div>
    </div>`;

  const ecartKpis = document.getElementById('inv-ecart-kpis');
  if (inventory.status === 'valide') {
    ecartKpis.classList.remove('hidden');
    ecartKpis.innerHTML = `
      <div class="kpi-card ${inventory.nb_ecarts > 0 ? 'danger' : 'success'}">
        <div class="kpi-icon"><i class="bi bi-exclamation-diamond-fill" style="color:${inventory.nb_ecarts > 0 ? 'var(--danger)' : 'var(--success)'}"></i></div>
        <div class="kpi-label">Écarts constatés</div>
        <div class="kpi-value">${inventory.nb_ecarts ?? 0}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon"><i class="bi bi-cash-stack" style="color:var(--primary)"></i></div>
        <div class="kpi-label">Valeur de l'écart (achat)</div>
        <div class="kpi-value">${fmt(inventory.valeur_ecart_fcfa ?? 0)}</div>
      </div>`;
  } else {
    ecartKpis.classList.add('hidden');
  }

  renderItems(inventory.items ?? []);

  const editable = inventory.status === 'en_cours';
  document.getElementById('btn-save-count').classList.toggle('hidden', !editable);
  document.getElementById('btn-validate-inventory').classList.toggle(
    'hidden', !editable || (inventory.progression ?? 0) < 100 || !hasRole('proprietaire')
  );

  const counted = (inventory.items ?? []).filter(i => i.status !== 'non_compte').length;
  const total   = (inventory.items ?? []).length;
  document.getElementById('inv-progress-label').textContent =
    `${counted} / ${total} produit(s) compté(s) — ${inventory.progression ?? 0}%`;
}

function ecartCellHtml(item) {
  if (item.difference === null || item.difference === undefined) return '<span class="row-ecart-zero">—</span>';
  if (item.difference === 0) return '<span class="row-ecart-zero">0</span>';
  const cls = item.difference > 0 ? 'row-ecart-pos' : 'row-ecart-neg';
  return `<span class="${cls}">${item.difference > 0 ? '+' : ''}${item.difference}</span>`;
}

function renderItems(items) {
  const editable = inventory.status === 'en_cours';
  const statusBadges = { non_compte: 'badge-neutral', ok: 'badge-success', ecart: 'badge-warning' };
  const statusLabels = { non_compte: 'Non compté', ok: 'OK', ecart: 'Écart' };

  renderTable('inv-items-tbody', items.map(item => `
    <tr data-name="${escHtml((item.product ?? '').toLowerCase())}">
      <td><strong>${escHtml(item.product ?? '—')}</strong></td>
      <td>${escHtml(item.category ?? '—')}</td>
      <td>${item.theoretical_qty} ${escHtml(item.unit ?? '')}</td>
      <td>
        <input type="number" min="0" class="form-control count-input"
          data-item-id="${item.id}"
          value="${item.counted_qty ?? ''}"
          placeholder="—"
          ${editable ? '' : 'disabled'}>
      </td>
      <td data-ecart-cell="${item.id}">${ecartCellHtml(item)}</td>
      <td data-status-cell="${item.id}">
        <span class="badge ${statusBadges[item.status] ?? 'badge-neutral'}">${statusLabels[item.status] ?? item.status}</span>
      </td>
    </tr>`), 'Aucun produit dans cet inventaire');

  if (editable) {
    document.querySelectorAll('.count-input').forEach(input => {
      input.addEventListener('input', () => {
        const item = (inventory.items ?? []).find(i => String(i.id) === input.dataset.itemId);
        if (!item) return;
        const val = input.value === '' ? null : Number(input.value);
        const diff = val === null ? null : val - item.theoretical_qty;
        document.querySelector(`[data-ecart-cell="${item.id}"]`).innerHTML =
          ecartCellHtml({ difference: diff });
      });
    });
  }
}

async function saveCount() {
  const rows = Array.from(document.querySelectorAll('.count-input'))
    .filter(input => input.value !== '')
    .map(input => ({
      inventory_item_id: Number(input.dataset.itemId),
      counted_qty: Number(input.value),
    }));

  if (rows.length === 0) {
    toast('Saisissez au moins une quantité comptée', 'warning');
    return;
  }

  try {
    const res = await api.post(`/inventories/${invId}/count`, { items: rows });
    toast(res.message ?? 'Comptage enregistré', 'success');
    await loadInventory();
  } catch (err) {
    toast(err.message, 'danger');
  }
}

async function validateInventory() {
  if (!confirm("Valider l'inventaire ? Le stock sera ajusté aux quantités comptées. Cette action est définitive.")) return;

  try {
    const res = await api.post(`/inventories/${invId}/validate`);
    toast(res.message ?? 'Inventaire validé', 'success');
    await loadInventory();
  } catch (err) {
    toast(err.message, 'danger');
  }
}

function bindEvents() {
  document.getElementById('btn-save-count').addEventListener('click', saveCount);
  document.getElementById('btn-validate-inventory').addEventListener('click', validateInventory);
  document.getElementById('inv-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#inv-items-tbody tr[data-name]').forEach(tr => {
      tr.style.display = tr.dataset.name.includes(q) ? '' : 'none';
    });
  });
}

init();
</script>
</body>
</html>
