<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caisse (POS) — Boutique D</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .pos-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      height: calc(100dvh - var(--nav-h) - 52px - 16px);
    }
    /* Colonne produits */
    .pos-left  { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    .pos-search-bar { display: flex; gap: 8px; }
    .pos-search-bar .form-control { flex: 1; font-size: .95rem; padding: 11px 16px; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
      overflow-y: auto;
      flex: 1;
      padding: 2px;
    }
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all .18s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .product-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      opacity: 0;
      transition: opacity .18s;
    }
    .product-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .product-card:hover::before { opacity: 1; }
    .product-card:active { transform: scale(.97); }
    .product-card.out { opacity: .42; cursor: not-allowed; }
    .product-card.out::before { display: none; }
    .p-cat   { font-size: .68rem; background: #f1f5f9; border-radius: 4px; padding: 2px 7px; color: var(--text-muted); align-self: flex-start; font-weight: 600; }
    .p-name  { font-weight: 700; font-size: .875rem; line-height: 1.3; color: var(--text); }
    .p-price { color: var(--primary); font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }
    .p-stock { font-size: .72rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .p-stock.rupture { color: var(--danger); }

    /* Colonne panier */
    .pos-right {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .cart-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .cart-title { font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: 7px; color: var(--text); }
    .cart-count {
      background: var(--primary);
      color: #fff;
      font-size: .68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
    }
    .cart-items { flex: 1; overflow-y: auto; }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
      transition: background .12s;
    }
    .cart-item:hover { background: #f8f9ff; }
    .cart-item-name { font-weight: 600; font-size: .85rem; }
    .cart-item-unit { color: var(--text-muted); font-size: .75rem; }

    .qty-ctrl { display: flex; align-items: center; gap: 4px; }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all .12s;
      color: var(--text);
    }
    .qty-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .qty-val { width: 30px; text-align: center; font-weight: 700; font-size: .9rem; }
    .cart-item-total { font-weight: 700; color: var(--primary); text-align: right; white-space: nowrap; font-size: .875rem; }
    .cart-item-del {
      color: var(--text-muted); cursor: pointer;
      font-size: .95rem; padding: 5px; border-radius: 6px;
      display: flex; align-items: center;
      transition: all .12s;
    }
    .cart-item-del:hover { color: var(--danger); background: var(--danger-light); }

    .cart-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 10px; color: var(--text-muted); padding: 24px; text-align: center;
    }
    .cart-empty .icon { font-size: 2.8rem; opacity: .2; }

    /* Summary */
    .cart-summary { padding: 14px 16px; border-top: 1px solid var(--border); background: #fafbff; }
    .summary-line { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: 7px; }
    .summary-total {
      display: flex; justify-content: space-between;
      font-size: 1.2rem; font-weight: 800;
      color: var(--primary-dark);
      padding-top: 10px;
      border-top: 2px solid var(--primary);
      margin-top: 6px;
      letter-spacing: -0.02em;
    }
    .cart-actions { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }

    /* Session banner */
    .session-banner {
      padding: 11px 16px;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }
    .session-banner.open   { background: var(--success-light); color: #047857; border: 1px solid #a7f3d0; }
    .session-banner.closed { background: var(--danger-light);  color: #dc2626; border: 1px solid #fecaca; }

    /* Receipt */
    .receipt {
      font-family: 'Courier New', monospace;
      font-size: .85rem;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      line-height: 1.7;
    }
    .receipt h3 { text-align: center; font-size: 1.05rem; margin-bottom: 4px; font-family: var(--font); }
    .receipt .receipt-sub  { text-align: center; color: #666; font-size: .78rem; margin-bottom: 10px; }
    .receipt hr            { border: none; border-top: 1px dashed #ccc; margin: 8px 0; }
    .receipt .receipt-row  { display: flex; justify-content: space-between; }
    .receipt .receipt-total { font-weight: 700; font-size: 1rem; }
    .receipt .receipt-footer { text-align: center; margin-top: 10px; font-size: .75rem; color: #888; }

    @media (max-width: 900px) {
      .pos-layout { grid-template-columns: 1fr; height: auto; }
      .pos-right  { max-height: 50dvh; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay"></div>

<div class="layout">
  <header class="topbar">
    <button class="topbar-menu-btn" id="menu-btn"><i class="bi bi-list"></i></button>
    <div class="topbar-brand">
      <div class="brand-icon"><i class="bi bi-bag-fill"></i></div>
      Boutique D
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="btn btn-ghost btn-sm" id="btn-logout">
      <i class="bi bi-box-arrow-right"></i> Déconnexion
    </button>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section">Principal</div>
    <a href="dashboard.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-grid-1x2-fill"></i></span> Dashboard
    </a>
    <a href="pos.html" class="nav-item">
      <span class="icon"><i class="bi bi-cash-register"></i></span> Caisse (POS)
    </a>
    <div class="sidebar-section" data-role="proprietaire,gestionnaire">Stock</div>
    <a href="stock.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-boxes"></i></span> Stock
      <span class="nav-badge hidden" id="alert-badge">0</span>
    </a>
    <a href="products.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-tag-fill"></i></span> Produits
    </a>
    <div class="sidebar-section" data-role="proprietaire">Gestion</div>
    <a href="users.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-people-fill"></i></span> Utilisateurs
    </a>
    <a href="reports.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-bar-chart-fill"></i></span> Rapports
    </a>
  </nav>

  <main class="main" style="overflow:hidden;padding:16px">
    <!-- Session banner -->
    <div id="session-banner" class="session-banner closed">
      <span id="session-info"><i class="bi bi-hourglass-split"></i> Chargement…</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-primary hidden" id="btn-open-session">
          <i class="bi bi-unlock-fill"></i> Ouvrir la caisse
        </button>
        <button class="btn btn-sm btn-outline hidden" id="btn-close-session">
          <i class="bi bi-lock-fill"></i> Fermer
        </button>
      </div>
    </div>

    <div class="pos-layout">
      <!-- Produits -->
      <div class="pos-left">
        <div class="pos-search-bar">
          <div style="position:relative;flex:1">
            <i class="bi bi-search" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none"></i>
            <input class="form-control" id="search" type="text"
                   placeholder="Nom ou code-barres…" style="padding-left:38px">
          </div>
          <select class="form-control form-select" id="cat-filter" style="max-width:155px">
            <option value="">Toutes catégories</option>
          </select>
          <select class="form-control form-select" id="type-filter" style="max-width:120px">
            <option value="detail">Détail</option>
            <option value="gros">Gros</option>
          </select>
        </div>
        <div class="products-grid" id="products-grid">
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
          <div class="skeleton" style="height:112px;border-radius:12px"></div>
        </div>
      </div>

      <!-- Panier -->
      <div class="pos-right">
        <div class="cart-header">
          <span class="cart-title">
            <i class="bi bi-cart3"></i> Panier
            <span class="cart-count" id="cart-count">0</span>
          </span>
          <button class="btn btn-sm btn-ghost" id="btn-clear-cart" style="font-size:.8rem">
            <i class="bi bi-trash3"></i> Vider
          </button>
        </div>
        <div class="cart-items" id="cart-items">
          <div class="cart-empty">
            <div class="icon"><i class="bi bi-cart-x"></i></div>
            <p>Cliquez sur un produit pour l'ajouter</p>
          </div>
        </div>
        <div class="cart-summary" id="cart-summary" style="display:none">
          <div class="summary-line"><span class="text-muted">Sous-total</span><span id="s-subtotal">0 FCFA</span></div>
          <div class="summary-line" id="s-remise-line" style="display:none">
            <span class="text-danger"><i class="bi bi-tag-fill"></i> Remise</span>
            <span id="s-remise" class="text-danger"></span>
          </div>
          <div class="summary-total"><span>TOTAL</span><span id="s-total">0 FCFA</span></div>
        </div>
        <div class="cart-actions">
          <div class="grid grid-2 gap-2">
            <button class="btn btn-outline btn-sm" id="btn-discount">
              <i class="bi bi-percent"></i> Remise
            </button>
            <select class="form-control form-select" id="payment-method" style="height:36px;font-size:.82rem">
              <option value="especes">Espèces</option>
              <option value="mobile_money">Mobile Money</option>
            </select>
          </div>
          <button class="btn btn-accent btn-lg btn-block" id="btn-pay" disabled>
            <i class="bi bi-credit-card-2-front-fill"></i> Encaisser
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal ouverture caisse -->
<div class="modal-backdrop" id="modal-open-session">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title"><i class="bi bi-unlock-fill" style="color:#10b981"></i> Ouvrir la caisse</span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Fonds de départ (FCFA)</label>
        <input class="form-control" id="opening-amount" type="number" min="0" value="0" placeholder="Ex: 50000">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss>Annuler</button>
      <button class="btn btn-primary" id="btn-confirm-open"><i class="bi bi-check-lg"></i> Ouvrir</button>
    </div>
  </div>
</div>

<!-- Modal fermeture caisse -->
<div class="modal-backdrop" id="modal-close-session">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title"><i class="bi bi-lock-fill" style="color:#ef4444"></i> Fermer la caisse</span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div id="session-summary-close"></div>
      <div class="form-group">
        <label class="form-label">Montant compté en caisse (FCFA)</label>
        <input class="form-control" id="closing-amount" type="number" min="0" placeholder="Ex: 85000">
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optionnel)</label>
        <textarea class="form-control" id="closing-notes" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss>Annuler</button>
      <button class="btn btn-danger" id="btn-confirm-close"><i class="bi bi-lock-fill"></i> Fermer la caisse</button>
    </div>
  </div>
</div>

<!-- Modal remise -->
<div class="modal-backdrop" id="modal-discount">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title"><i class="bi bi-percent" style="color:#f59e0b"></i> Appliquer une remise</span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Type de remise</label>
        <select class="form-control form-select" id="discount-type">
          <option value="percent">Pourcentage (%)</option>
          <option value="fixed">Montant fixe (FCFA)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" id="discount-label">Valeur (%)</label>
        <input class="form-control" id="discount-value" type="number" min="0" step="1" placeholder="Ex: 5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-dismiss>Annuler</button>
      <button class="btn btn-primary" id="btn-apply-discount"><i class="bi bi-check-lg"></i> Appliquer</button>
    </div>
  </div>
</div>

<!-- Modal paiement / reçu -->
<div class="modal-backdrop" id="modal-payment">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title" id="payment-title"><i class="bi bi-credit-card-fill"></i> Encaissement</span>
      <button class="modal-close" data-dismiss><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body" id="payment-body"></div>
    <div class="modal-footer" id="payment-footer"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth();

let allProducts = [];
let cart = [];
let discount = { type: null, value: 0 };
let session = null;

async function init() {
  await Promise.all([loadSession(), loadProducts(), loadCategories()]);
  bindEvents();
}

async function loadSession() {
  try {
    session = await api.get('/cash-sessions/current');
    updateSessionBanner();
  } catch { session = null; updateSessionBanner(); }
}

function updateSessionBanner() {
  const banner  = document.getElementById('session-banner');
  const info    = document.getElementById('session-info');
  const btnOpen = document.getElementById('btn-open-session');
  const btnClose= document.getElementById('btn-close-session');
  const btnPay  = document.getElementById('btn-pay');

  if (session) {
    banner.className = 'session-banner open';
    info.innerHTML = `<i class="bi bi-check-circle-fill"></i> Caisse ouverte depuis ${escHtml(session.opened_at)} — Fonds : ${fmt(session.opening_amount)}`;
    btnOpen.classList.add('hidden');
    btnClose.classList.remove('hidden');
    btnPay.disabled = cart.length === 0;
  } else {
    banner.className = 'session-banner closed';
    info.innerHTML = '<i class="bi bi-x-circle-fill"></i> Caisse fermée — Ouvrez la caisse pour encaisser';
    btnOpen.classList.remove('hidden');
    btnClose.classList.add('hidden');
    btnPay.disabled = true;
  }
}

async function loadProducts() {
  try {
    allProducts = await api.get('/products');
    renderProducts(allProducts);
  } catch (err) { toast(err.message, 'danger'); }
}

async function loadCategories() {
  try {
    const cats = await api.get('/categories');
    const sel  = document.getElementById('cat-filter');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch {}
}

function renderProducts(products) {
  const grid     = document.getElementById('products-grid');
  const saleType = document.getElementById('type-filter').value;
  const filtered = products.filter(p => p.is_active);

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon"><i class="bi bi-search"></i></div><p>Aucun produit trouvé</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const qty   = p.stock_quantity ?? 0;
    const price = saleType === 'gros'
      ? (p.prices?.wholesale_price ?? p.prices?.retail_price ?? 0)
      : (p.prices?.retail_price ?? 0);
    const out = qty <= 0;
    return `<div class="product-card${out ? ' out' : ''}" data-id="${p.id}" title="${escHtml(p.name)}">
      <span class="p-cat">${escHtml(p.category ?? '')}</span>
      <span class="p-name">${escHtml(p.name)}</span>
      <span class="p-price">${fmt(price)}</span>
      <span class="p-stock ${out ? 'rupture' : ''}">
        <i class="bi bi-${out ? 'x-circle-fill' : 'box-seam'}"></i>
        ${out ? 'Rupture' : `${qty} ${escHtml(p.unit)}`}
      </span>
    </div>`;
  }).join('');

  grid.querySelectorAll('.product-card:not(.out)').forEach(el => {
    el.addEventListener('click', () => addToCart(Number(el.dataset.id)));
  });
}

function filterProducts() {
  const q     = document.getElementById('search').value.toLowerCase().trim();
  const catId = document.getElementById('cat-filter').value;
  let list    = allProducts;
  if (q)     list = list.filter(p => p.name.toLowerCase().includes(q) || (p.barcode || '').includes(q));
  if (catId) list = list.filter(p => String(p.category_id) === catId);
  renderProducts(list);
}

function getUnitPrice(product) {
  const saleType = document.getElementById('type-filter').value;
  return saleType === 'gros'
    ? (product.prices?.wholesale_price ?? product.prices?.retail_price ?? 0)
    : (product.prices?.retail_price ?? 0);
}

function addToCart(productId) {
  const product  = allProducts.find(p => p.id === productId);
  if (!product) return;
  const maxQty   = product.stock_quantity ?? 0;
  const existing = cart.find(i => i.product.id === productId);
  if (existing) {
    if (existing.qty >= maxQty) { toast(`Stock maximum atteint (${maxQty} ${escHtml(product.unit)})`, 'warning'); return; }
    existing.qty++;
  } else {
    cart.push({ product, qty: 1, unitPrice: getUnitPrice(product) });
  }
  renderCart();
}

function removeFromCart(idx) { cart.splice(idx, 1); renderCart(); }

function updateQty(idx, delta) {
  const item   = cart[idx];
  const newQty = item.qty + delta;
  const maxQty = item.product.stock?.quantity ?? 0;
  if (newQty <= 0) { removeFromCart(idx); return; }
  if (newQty > maxQty) { toast(`Stock insuffisant (${maxQty} dispo)`, 'warning'); return; }
  item.qty = newQty;
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const summary   = document.getElementById('cart-summary');
  const countEl   = document.getElementById('cart-count');

  if (countEl) countEl.textContent = cart.reduce((s, i) => s + i.qty, 0);

  if (!cart.length) {
    container.innerHTML = '<div class="cart-empty"><div class="icon"><i class="bi bi-cart-x"></i></div><p>Cliquez sur un produit pour l\'ajouter</p></div>';
    summary.style.display = 'none';
    document.getElementById('btn-pay').disabled = true;
    return;
  }

  container.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${escHtml(item.product.name)}</div>
        <div class="cart-item-unit">${fmt(item.unitPrice)} / ${escHtml(item.product.unit)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-action="dec" data-idx="${idx}">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" data-action="inc" data-idx="${idx}">+</button>
      </div>
      <div class="cart-item-total">${fmt(item.qty * item.unitPrice)}</div>
      <span class="cart-item-del" data-del="${idx}"><i class="bi bi-trash3"></i></span>
    </div>`).join('');

  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => updateQty(Number(btn.dataset.idx), btn.dataset.action === 'inc' ? 1 : -1));
  });
  container.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => removeFromCart(Number(btn.dataset.del)));
  });

  const subtotal = cart.reduce((s, i) => s + i.qty * i.unitPrice, 0);
  let remise = 0;
  if (discount.type === 'percent') remise = Math.round(subtotal * discount.value / 100);
  if (discount.type === 'fixed')   remise = Math.min(discount.value, subtotal);
  const total = subtotal - remise;

  summary.style.display = 'block';
  document.getElementById('s-subtotal').textContent = fmt(subtotal);
  document.getElementById('s-total').textContent    = fmt(total);
  const remiseLine = document.getElementById('s-remise-line');
  if (remise > 0) {
    remiseLine.style.display = 'flex';
    document.getElementById('s-remise').textContent = `- ${fmt(remise)}`;
  } else {
    remiseLine.style.display = 'none';
  }

  document.getElementById('btn-pay').disabled = !session || cart.length === 0;
}

function openPayment() {
  const subtotal = cart.reduce((s, i) => s + i.qty * i.unitPrice, 0);
  let remise = 0;
  if (discount.type === 'percent') remise = Math.round(subtotal * discount.value / 100);
  if (discount.type === 'fixed')   remise = Math.min(discount.value, subtotal);
  const total    = subtotal - remise;
  const method   = document.getElementById('payment-method').value;
  const saleType = document.getElementById('type-filter').value;

  document.getElementById('payment-title').innerHTML = '<i class="bi bi-credit-card-fill"></i> Confirmer l\'encaissement';
  document.getElementById('payment-body').innerHTML = `
    <div class="alert alert-success mb-4">
      <i class="bi bi-check-circle-fill"></i>
      <div>Total à encaisser : <strong>${fmt(total)}</strong></div>
    </div>
    ${method === 'especes' ? `
    <div class="form-group">
      <label class="form-label">Montant reçu (FCFA)</label>
      <input class="form-control" id="cash-received" type="number" min="${total}" step="100" value="${total}">
      <div class="form-hint" id="monnaie-hint">Monnaie à rendre : ${fmt(0)}</div>
    </div>` : `
    <div class="form-group">
      <label class="form-label">Numéro Mobile Money</label>
      <input class="form-control" id="mobile-number" type="tel" placeholder="Ex: 0600000000">
    </div>`}
  `;
  document.getElementById('payment-footer').innerHTML = `
    <button class="btn btn-outline" data-dismiss>Annuler</button>
    <button class="btn btn-accent btn-lg" id="btn-confirm-pay">
      <i class="bi bi-check-circle-fill"></i> Encaisser ${fmt(total)}
    </button>
  `;

  const cashInput = document.getElementById('cash-received');
  if (cashInput) {
    cashInput.addEventListener('input', () => {
      const received = Number(cashInput.value);
      const monnaie  = received - total;
      const hint     = document.getElementById('monnaie-hint');
      hint.textContent = received >= total ? `Monnaie à rendre : ${fmt(monnaie)}` : 'Montant insuffisant';
      hint.className = received >= total ? 'form-hint text-success' : 'form-hint text-danger';
    });
  }

  document.getElementById('btn-confirm-pay').addEventListener('click', () => {
    const amountPaid   = method === 'especes' ? Number(document.getElementById('cash-received')?.value ?? total) : total;
    const mobileNumber = method === 'mobile_money' ? document.getElementById('mobile-number')?.value : null;
    processSale(total, subtotal, remise, method, saleType, amountPaid, mobileNumber);
  });
  openModal('modal-payment');
}

async function processSale(total, subtotal, remise, method, saleType, amountPaid, mobileNumber) {
  const btn = document.getElementById('btn-confirm-pay');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>';

  const items = cart.map(i => ({ product_id: i.product.id, quantity: i.qty }));
  const body  = {
    sale_type:      saleType,
    payment_method: method,
    amount_paid:    amountPaid ?? total,
    items,
    ...(mobileNumber ? { mobile_money_number: mobileNumber } : {}),
    ...(discount.type ? { discount_type: discount.type, discount_value: discount.value } : {}),
  };

  try {
    const sale = await api.post('/sales', body);
    closeModal('modal-payment');
    showReceipt(sale);
    cart = [];
    discount = { type: null, value: 0 };
    renderCart();
    await loadProducts();
  } catch (err) {
    toast(err.message, 'danger');
    btn.disabled = false;
    btn.innerHTML = `<i class="bi bi-check-circle-fill"></i> Encaisser ${fmt(total)}`;
  }
}

function showReceipt(sale) {
  const lines = (sale.items || []).map(i =>
    `<div class="receipt-row"><span>${escHtml(i.product)} × ${i.quantity}</span><span>${fmt(i.total)}</span></div>`
  ).join('');

  document.getElementById('payment-title').innerHTML = '<i class="bi bi-receipt"></i> Reçu';
  document.getElementById('payment-body').innerHTML = `
    <div class="receipt">
      <h3><i class="bi bi-bag-fill"></i> Boutique D</h3>
      <div class="receipt-sub">${escHtml(sale.created_at ?? '')}</div>
      <div class="receipt-sub">${escHtml(sale.receipt_number ?? '')}</div>
      <hr>
      ${lines}
      <hr>
      <div class="receipt-row"><span>Sous-total</span><span>${fmt(sale.subtotal)}</span></div>
      ${sale.discount_value > 0 ? `<div class="receipt-row"><span>Remise</span><span>- ${fmt(sale.discount_value)}</span></div>` : ''}
      <div class="receipt-row receipt-total"><span>TOTAL</span><span>${fmt(sale.total)}</span></div>
      <hr>
      <div class="receipt-row"><span>Paiement</span><span>${sale.payment_method === 'especes' ? 'Espèces' : 'Mobile Money'}</span></div>
      ${sale.amount_paid ? `<div class="receipt-row"><span>Reçu</span><span>${fmt(sale.amount_paid)}</span></div>` : ''}
      ${sale.change_given > 0 ? `<div class="receipt-row"><span>Monnaie rendue</span><span>${fmt(sale.change_given)}</span></div>` : ''}
      <div class="receipt-footer">Merci pour votre achat !</div>
    </div>`;
  document.getElementById('payment-footer').innerHTML = `
    <button class="btn btn-primary btn-block" data-dismiss>
      <i class="bi bi-check-lg"></i> Fermer
    </button>`;
  openModal('modal-payment');
  toast('Vente enregistrée avec succès !', 'success');
}

function bindEvents() {
  document.getElementById('search').addEventListener('input', filterProducts);
  document.getElementById('cat-filter').addEventListener('change', filterProducts);
  document.getElementById('type-filter').addEventListener('change', () => {
    cart.forEach(i => { i.unitPrice = getUnitPrice(i.product); });
    filterProducts();
    renderCart();
  });

  document.getElementById('btn-clear-cart').addEventListener('click', () => {
    cart = []; discount = { type: null, value: 0 }; renderCart();
  });

  document.getElementById('btn-discount').addEventListener('click', () => openModal('modal-discount'));
  document.getElementById('discount-type').addEventListener('change', e => {
    document.getElementById('discount-label').textContent = e.target.value === 'percent' ? 'Valeur (%)' : 'Montant (FCFA)';
  });
  document.getElementById('btn-apply-discount').addEventListener('click', () => {
    discount.type  = document.getElementById('discount-type').value;
    discount.value = Number(document.getElementById('discount-value').value) || 0;
    closeModal('modal-discount');
    renderCart();
    if (discount.value > 0) toast(`Remise de ${discount.value}${discount.type === 'percent' ? '%' : ' FCFA'} appliquée`, 'success');
  });

  document.getElementById('btn-pay').addEventListener('click', openPayment);

  document.getElementById('btn-open-session').addEventListener('click', () => openModal('modal-open-session'));
  document.getElementById('btn-confirm-open').addEventListener('click', async () => {
    const amount = Number(document.getElementById('opening-amount').value) || 0;
    try {
      session = await api.post('/cash-sessions/open', { opening_amount: amount });
      closeModal('modal-open-session');
      updateSessionBanner();
      toast('Caisse ouverte avec succès', 'success');
    } catch (err) { toast(err.message, 'danger'); }
  });

  document.getElementById('btn-close-session').addEventListener('click', async () => {
    if (!session) return;
    const current = await api.get('/cash-sessions/current').catch(() => null);
    if (current) {
      document.getElementById('session-summary-close').innerHTML = `
        <div class="alert alert-warning mb-4">
          <i class="bi bi-info-circle-fill"></i>
          <div>
            <div>Total ventes théorique : <strong>${fmt(current.total_sales ?? 0)}</strong></div>
            <div>Montant théorique en caisse : <strong>${fmt(current.theoretical_amount ?? 0)}</strong></div>
          </div>
        </div>`;
    }
    openModal('modal-close-session');
  });
  document.getElementById('btn-confirm-close').addEventListener('click', async () => {
    const closing = Number(document.getElementById('closing-amount').value);
    const notes   = document.getElementById('closing-notes').value;
    if (!closing && closing !== 0) { toast('Entrez le montant compté', 'warning'); return; }
    try {
      await api.post('/cash-sessions/close', { closing_amount: closing, notes });
      session = null;
      closeModal('modal-close-session');
      updateSessionBanner();
      toast('Caisse fermée', 'success');
    } catch (err) { toast(err.message, 'danger'); }
  });
}

init();
</script>
</body>
</html>
