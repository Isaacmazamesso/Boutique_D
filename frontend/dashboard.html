<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Boutique D</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay"></div>

<div class="layout">
  <!-- Topbar -->
  <header class="topbar">
    <button class="topbar-menu-btn" id="menu-btn"><i class="bi bi-list"></i></button>
    <div class="topbar-brand">
      <div class="brand-icon"><i class="bi bi-bag-fill"></i></div>
      Boutique D
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="btn btn-ghost btn-sm" id="btn-logout">
      <i class="bi bi-box-arrow-right"></i> Déconnexion
    </button>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section">Principal</div>
    <a href="dashboard.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-grid-1x2-fill"></i></span> Dashboard
    </a>
    <a href="pos.html" class="nav-item">
      <span class="icon"><i class="bi bi-cash-register"></i></span> Caisse (POS)
    </a>

    <div class="sidebar-section" data-role="proprietaire,gestionnaire">Stock</div>
    <a href="stock.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-boxes"></i></span> Stock
      <span class="nav-badge hidden" id="alert-badge">0</span>
    </a>
    <a href="products.html" class="nav-item" data-role="proprietaire,gestionnaire">
      <span class="icon"><i class="bi bi-tag-fill"></i></span> Produits
    </a>

    <div class="sidebar-section" data-role="proprietaire">Gestion</div>
    <a href="users.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-people-fill"></i></span> Utilisateurs
    </a>
    <a href="reports.html" class="nav-item" data-role="proprietaire">
      <span class="icon"><i class="bi bi-bar-chart-fill"></i></span> Rapports
    </a>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-title">
      <div class="page-icon" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
        <i class="bi bi-grid-1x2-fill"></i>
      </div>
      Dashboard
      <small id="subtitle">Aujourd'hui</small>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card primary skeleton" style="height:110px"></div>
      <div class="kpi-card skeleton" style="height:110px"></div>
      <div class="kpi-card skeleton" style="height:110px"></div>
      <div class="kpi-card skeleton" style="height:110px"></div>
    </div>

    <div class="grid grid-2 gap-4 mb-6" id="row2">
      <!-- Alertes -->
      <div class="card" id="card-alertes">
        <div class="card-header">
          <div class="card-title">
            <i class="bi bi-bell-fill" style="color:#f59e0b"></i> Alertes
          </div>
        </div>
        <div class="card-body" id="alertes-body">
          <div class="skeleton" style="height:80px"></div>
        </div>
      </div>
      <!-- Caissiers -->
      <div class="card" id="card-caissiers">
        <div class="card-header">
          <div class="card-title">
            <i class="bi bi-person-badge-fill" style="color:#4f46e5"></i> Caissiers actifs
          </div>
        </div>
        <div class="card-body" id="caissiers-body">
          <div class="skeleton" style="height:80px"></div>
        </div>
      </div>
    </div>

    <div class="grid grid-2 gap-4">
      <!-- Top 5 produits -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="bi bi-trophy-fill" style="color:#f59e0b"></i> Top 5 Produits — Aujourd'hui
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Produit</th>
                <th class="text-right">Qté</th>
                <th class="text-right">CA</th>
              </tr>
            </thead>
            <tbody id="top5-tbody"></tbody>
          </table>
        </div>
      </div>
      <!-- Périodes -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="bi bi-calendar3" style="color:#4f46e5"></i> Périodes
          </div>
        </div>
        <div class="card-body" id="periods-body"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth();

async function loadDashboard() {
  try {
    const d = await api.get('/dashboard');

    const evol = d.ca.evolution_pct !== null
      ? `${d.ca.evolution_pct > 0 ? '<i class="bi bi-arrow-up-short"></i>' : '<i class="bi bi-arrow-down-short"></i>'} ${Math.abs(d.ca.evolution_pct)}% vs hier`
      : 'Pas de données hier';

    document.getElementById('kpi-grid').innerHTML = `
      <div class="kpi-card primary">
        <div class="kpi-icon"><i class="bi bi-cash-stack"></i></div>
        <div class="kpi-label">CA du jour</div>
        <div class="kpi-value">${fmt(d.ca.jour)}</div>
        <div class="kpi-sub">${evol}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon"><i class="bi bi-cart-fill" style="color:#f59e0b"></i></div>
        <div class="kpi-label">Ventes</div>
        <div class="kpi-value">${d.ventes.nb_jour}</div>
        <div class="kpi-sub">Panier moy. ${fmt(d.ventes.panier_moyen)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon"><i class="bi bi-graph-up-arrow" style="color:#10b981"></i></div>
        <div class="kpi-label">Bénéfice estimé</div>
        <div class="kpi-value">${fmt(d.benefice.jour)}</div>
        <div class="kpi-sub">Marge ${escHtml(String(d.benefice.marge_pct))}%</div>
      </div>
      <div class="kpi-card ${d.alertes.total > 0 ? 'accent' : ''}">
        <div class="kpi-icon"><i class="bi bi-${d.alertes.total > 0 ? 'exclamation-triangle-fill' : 'check-circle-fill'}"></i></div>
        <div class="kpi-label">Alertes</div>
        <div class="kpi-value">${d.alertes.total}</div>
        <div class="kpi-sub">${d.alertes.rupture} rupture · ${d.alertes.stock_bas} stock bas</div>
      </div>
    `;

    // Alertes détail
    const alertLines = [
      d.alertes.rupture    > 0 ? `<div class="alert alert-danger mb-2"><i class="bi bi-x-circle-fill"></i> ${d.alertes.rupture} produit(s) en rupture de stock</div>`        : '',
      d.alertes.stock_bas  > 0 ? `<div class="alert alert-warning mb-2"><i class="bi bi-exclamation-triangle-fill"></i> ${d.alertes.stock_bas} produit(s) en stock bas</div>`  : '',
      d.alertes.peremption > 0 ? `<div class="alert alert-warning mb-2"><i class="bi bi-calendar-x-fill"></i> ${d.alertes.peremption} produit(s) bientôt périmé(s)</div>`       : '',
      d.alertes.ecarts_caisse > 0 ? `<div class="alert alert-danger mb-2"><i class="bi bi-wallet2"></i> ${d.alertes.ecarts_caisse} session(s) avec écart de caisse</div>`     : '',
    ].filter(Boolean);
    document.getElementById('alertes-body').innerHTML = alertLines.length
      ? alertLines.join('')
      : '<div class="empty-state" style="padding:24px"><div class="icon"><i class="bi bi-check-circle-fill" style="color:#10b981;opacity:1"></i></div><p>Aucune alerte</p></div>';

    // Caissiers
    const caissierLines = d.caissiers.map(c => `
      <div class="flex items-center justify-between mb-2">
        <span class="font-bold">${escHtml(c.name)}</span>
        <div class="flex gap-2">
          <span class="badge ${c.en_ligne ? 'badge-success' : 'badge-neutral'}">
            <i class="bi bi-circle-fill" style="font-size:.5rem"></i>
            ${c.en_ligne ? 'En ligne' : 'Hors ligne'}
          </span>
          <span class="badge ${c.caisse_ouverte ? 'badge-accent' : 'badge-neutral'}">
            <i class="bi bi-cash-register"></i>
            ${c.caisse_ouverte ? 'Ouverte' : 'Fermée'}
          </span>
        </div>
      </div>`);
    document.getElementById('caissiers-body').innerHTML = caissierLines.length
      ? caissierLines.join('')
      : '<div class="text-muted font-sm text-center" style="padding:20px">Aucun caissier actif</div>';

    // Top 5 produits
    const top5Rows = d.top5_produits.map(p => `
      <tr>
        <td>
          <span class="font-bold">${escHtml(p.product)}</span><br>
          <span class="text-muted font-sm">${escHtml(p.unit)}</span>
        </td>
        <td class="text-right font-bold">${p.total_qty}</td>
        <td class="text-right text-success font-bold">${fmt(p.total_ca)}</td>
      </tr>`);
    renderTable('top5-tbody', top5Rows, 'Aucune vente aujourd\'hui');

    // Périodes
    document.getElementById('periods-body').innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <span class="text-muted">CA Semaine</span>
        <span class="font-bold">${fmt(d.ca.semaine)}</span>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span class="text-muted">CA Mois</span>
        <span class="font-bold">${fmt(d.ca.mois)}</span>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span class="text-muted">CA Hier</span>
        <span class="font-bold">${fmt(d.ca.hier)}</span>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">
      <div class="flex justify-between items-center">
        <span class="text-muted">Bénéfice mois (estimé)</span>
        <span class="font-bold text-success">${fmt(d.benefice.jour)}</span>
      </div>
    `;

  } catch (err) {
    toast(err.message, 'danger');
  }
}

loadDashboard();
setInterval(loadDashboard, 60000);
</script>
</body>
</html>
